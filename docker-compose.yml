services:
  db:
    image: postgres:16
    container_name: hillary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hillary
      POSTGRES_USER: hillary
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hillary_dev}
    volumes:
      - hillary_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillary"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hillary-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg://hillary:${DB_PASSWORD:-hillary_dev}@db:5432/hillary
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CLIO_CLIENT_ID: ${CLIO_CLIENT_ID}
      CLIO_CLIENT_SECRET: ${CLIO_CLIENT_SECRET}
      CLIO_REDIRECT_URI: ${CLIO_REDIRECT_URI:-http://localhost:8001/api/auth/clio/callback}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      TEMPLATES_DIR: /app/templates_docx
      OUTPUT_DIR: /data/output
    volumes:
      - hillary_output:/data/output
      - ./backend/app/templates_docx:/app/templates_docx
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hillary-frontend-dev
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    profiles:
      - dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: hillary-frontend
    restart: unless-stopped
    ports:
      - "5174:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    profiles:
      - prod

volumes:
  hillary_pgdata:
    name: hillary_pgdata
  hillary_output:
    name: hillary_output

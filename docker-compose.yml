services:
  db:
    image: pgvector/pgvector:pg17
    container_name: quill-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quill
      POSTGRES_USER: quill
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quill_dev}
    volumes:
      - quill_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quill"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quill-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg://quill:${DB_PASSWORD:-quill_dev}@db:5432/quill
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CLIO_CLIENT_ID: ${CLIO_CLIENT_ID}
      CLIO_CLIENT_SECRET: ${CLIO_CLIENT_SECRET}
      CLIO_REDIRECT_URI: ${CLIO_REDIRECT_URI:-https://127.0.0.1/api/auth/clio/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:5174}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      TEMPLATES_DIR: /app/templates_docx
      OUTPUT_DIR: /data/output
    volumes:
      - quill_output:/data/output
      - ./backend/app/templates_docx:/app/templates_docx
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  nginx:
    image: nginx:alpine
    container_name: quill-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: quill-frontend-dev
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - NEXT_PUBLIC_API_URL=https://127.0.0.1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    profiles:
      - dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: quill-frontend
    restart: unless-stopped
    ports:
      - "5174:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://127.0.0.1
    depends_on:
      - backend
    profiles:
      - prod

volumes:
  quill_pgdata:
    name: quill_pgdata
  quill_output:
    name: quill_output
